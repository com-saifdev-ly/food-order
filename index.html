<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#08111f" />
  <meta name="msapplication-navbutton-color" content="#08111f" />
  <meta name="apple-mobile-web-app-status-bar-style" content="#08111f" />
  <link rel="icon" href="/assets/favicon.png" />
  <meta name="description" content="Order and pick up food for your family and friends" />
  <link rel="apple-touch-icon" href="/assets/logo.png" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="/manifest.json" />
  <title>Food Order</title>
  <!-- Inline styles to prevent white screen - loads before CSS -->
  <style>
    body {
      background-color: #08111f !important;
      margin: 0 !important;
      padding: 0 !important;
      min-height: 100vh;
    }

    #root {
      min-height: 100vh;
    }
  </style>
  <script>
    // Aggressive service worker cleanup to prevent white screen issues
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            registration.unregister();
            console.log('Service worker unregistered:', registration);
          });
        });
      });
    }
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      To begin the development, run 'npm start' or 'yarn start'.
      To create a production bundle, use 'npm run build' or 'yarn build'.
    -->
  <script type="module" src="/src/index.jsx"></script>

</html>
